version: "3.9"

services:
  monitoring:
    build: .
    container_name: ai-monitoring
    restart: unless-stopped
    network_mode: host
    # Les clés sont injectées via start.sh depuis le keystore OpenClaw
    # Ne jamais mettre de clés en dur ici
    environment:
      # Clés dédiées monitoring — distinctes des clés prod
      - OPENAI_API_KEY=${OPENAI_API_KEY_MONITORING}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY_MONITORING}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY_MONITORING}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DB_PATH=${DB_PATH:-/data/monitoring.db}
      - OPENCLAW_LOGS_DIR=${OPENCLAW_LOGS_DIR:-/openclaw-logs}
      - OPENCLAW_SESSIONS_DIR=${OPENCLAW_SESSIONS_DIR:-/openclaw-sessions}
      - OPENCLAW_CRON_DIR=${OPENCLAW_CRON_DIR:-/openclaw-cron}
      # Watchtower HTTP API (optionnel — fallback: sidecar host-health.json)
      - WATCHTOWER_API_URL=${WATCHTOWER_API_URL:-http://127.0.0.1:8080}
      - WATCHTOWER_API_TOKEN=${WATCHTOWER_API_TOKEN:-}
      # OpenClaw Gateway API (optionnel — live sessions/agents)
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-https://127.0.0.1:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # Webmin (optionnel — monitoring host via XML-RPC)
      - WEBMIN_URL=${WEBMIN_URL:-https://127.0.0.1:10000/xmlrpc.cgi}
      - WEBMIN_USER=${WEBMIN_USER:-}
      - WEBMIN_PASSWORD=${WEBMIN_PASSWORD:-}
      # ChatGPT Plus OAuth (optional — account info + rate limits)
      - CHATGPT_OAUTH_TOKEN=${CHATGPT_OAUTH_TOKEN:-}
      # Anthropic Console billing (optionnel)
      - ANTHROPIC_CONSOLE_API_KEY=${ANTHROPIC_CONSOLE_API_KEY:-}
      - CLAUDE_HOME=/claude-home
      # Google Cloud service account billing (optionnel)
      - GOOGLE_SA_KEY_PATH=${GOOGLE_SA_KEY_PATH:-/google-sa-key.json}
    volumes:
      # Données persistantes SQLite + health cache + sidecar hôte
      - ./data:/data
      # Logs OpenClaw en lecture seule
      - ${HOME}/.openclaw/logs:/openclaw-logs:ro
      # Sessions OpenClaw (usage tokens) en lecture seule
      - ${HOME}/.openclaw/agents:/openclaw-sessions:ro
      # Cron runs OpenClaw (Claude API usage) en lecture seule
      - ${HOME}/.openclaw/cron/runs:/openclaw-cron:ro
      # Cron jobs config (schedule, status) en lecture seule
      - ${HOME}/.openclaw/cron/jobs.json:/openclaw-cron-jobs.json:ro
      # Opt-in : billing Anthropic via token Claude Code CLI (sensible — décommenter si besoin)
      # - ${HOME}/.claude:/claude-home:ro
      # Opt-in : billing Google Cloud via service account JSON key
      # - ${HOME}/google-sa-key.json:/google-sa-key.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
